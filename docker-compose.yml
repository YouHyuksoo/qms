version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qms-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: qmsdb
      POSTGRES_USER: qms_user
      POSTGRES_PASSWORD: qms_password
    volumes:
      - qms_pgdata:/var/lib/postgresql/data

volumes:
  qms_pgdata:
